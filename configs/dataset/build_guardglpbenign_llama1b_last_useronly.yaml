# Phase-1: GLP training corpus from benign guard-glp-benign conversations.
#   bash scripts/dataset/build_activations.sh configs/dataset/build_guardglpbenign_llama1b_last_useronly.yaml
#
# USER-ONLY view: only the first user turn is taken as a standalone single-turn
# prompt and chat-templated with add_generation_prompt=True — exactly the input a
# deployment-time filter screens (an incoming user prompt, no assistant text). The
# last non-pad token (the assistant generation-prompt position) is pooled. Pairs
# with the "full" config (same layers/model).
#
# Layers: residual-stream output at 50% / 75% / second-to-last of Llama-3.2-1B's
# 16 blocks -> [8, 12, 14] (0-indexed).
#
# Data-parallel: the 1B model fits on one GPU, so we run `num_gpus` independent
# shards (one full model per GPU, each striding the corpus). Set
# tensor_parallel_size > 1 only for a model too large for a single GPU.
save_root: .
model_name: meta-llama/Llama-3.2-1B-Instruct
output_dir: ${save_root}/data/llama1b-guardglpbenign-useronly   # must be on the shared FS
backend: vllm_nnsight          # high-throughput path; requires the `serve` extra
num_gpus: 8                    # data-parallel shards (one full model per GPU)
dataset:
  path: ddidacus/guard-glp-benign
  split: train
  format: chat                 # chat -> apply_chat_template; text -> use text_field
  conversation_field: conversation
  text_field: null
  prompt_view: user            # first user turn only (vs. "full" = whole conversation)
  dedup: true
  max_samples: null            # null = full corpus; set an int for a smoke run
extract:
  layer_prefix: model.layers
  layers: [8, 12, 14]          # 50% / 75% / second-to-last of 16 blocks
  retain: output
  granularity: [last]          # one pooled vector per prompt
  max_length: 2048
  # batch_size kept modest: vllm_nnsight prefills the whole batch in one step
  # (max_num_batched_tokens = batch_size * max_length) for complete single-pass
  # capture, so a large batch of long prompts would be a huge prefill. 16 x 2048 is
  # safe on an 80 GB H100 and already saturates throughput (~40 conv/s/GPU).
  batch_size: 16
  dtype: bfloat16              # disk footprint; trainer reads via dtype.txt (stored as int16)
  queue_maxsize: 16            # bounded producer buffer
  file_size: 33554432          # elements per memmap chunk
  tensor_parallel_size: 1      # 1 = data-parallel (see header); >1 = tensor parallel
