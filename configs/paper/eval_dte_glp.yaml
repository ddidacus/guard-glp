# num_samples: 64
layers: [7, 13, 15]
model: "1b"
out_dir: "results/paper-eval-dte-glp"
num_gpus: 8

# Use the Guard-GLP HF dataset directly.
# train split      → good (in-distribution) prompts + DTE reference
# calibration split → Youden-J threshold calibration (and linear-probe training)
# test split        → final metrics

# Scoring method: hutchinson | dte | dte_glp
method: "dte_glp"
glp_sample_steps: 100

# DTE-specific (ignored for dte_glp reference, used for KNN scoring)
reference_num_samples: 4096 
dte_K: 16
dte_num_sigma_bins: 512
noise_level: 0.0
num_timesteps: 200
