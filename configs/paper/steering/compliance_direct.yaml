steering_type: "compliance"  # sv = mean act of (adv_prompt + acceptance suffix)
glp: false                   # plain additive hook: hidden += alpha * sv

alphas: [0.01, 0.1, 0.5, 1.0, 2.0]

batch_size: 8
guard_batch_size: 32
max_new_tokens: 128

guard_device: "cuda:0"

out_dir: "results/steering_compliance_direct"
